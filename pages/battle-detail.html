<section class="battle-detail-page">


    <!-- =========================
         Battle Header
    ========================== -->


    <section class="battle-detail-header">


        <div class="battle-result-large win">

            WIN

        </div>


        <h1 class="battle-detail-title">

            バトル詳細

        </h1>


        <p class="battle-detail-date">

            取得日時

        </p>


    </section>



    <!-- =========================
         Stage Information
    ========================== -->


    <section class="page-section">


        <div class="page-section-header">


            <h2 class="page-section-title">

                試合情報

            </h2>


        </div>



        <div class="battle-summary">


            <div class="summary-box">


                <p class="summary-label">

                    ルール

                </p>


                <p

                    id="detailRule"

                    class="summary-value"

                >

                    --

                </p>


            </div>



            <div class="summary-box">


                <p class="summary-label">

                    ステージ

                </p>


                <p

                    id="detailStage"

                    class="summary-value"

                >

                    --

                </p>


            </div>



            <div class="summary-box">


                <p class="summary-label">

                    時間

                </p>


                <p

                    id="detailTime"

                    class="summary-value"

                >

                    --

                </p>


            </div>



            <div class="summary-box">


                <p class="summary-label">

                    結果

                </p>


                <p

                    id="detailWinLose"

                    class="summary-value"

                >

                    --

                </p>


            </div>


        </div>


    </section>

<section class="page-section">


<h2 class="page-section-title">

試合詳細

</h2>


<div
id="battleDetail"
class="card"
>

</div>


</section>

    <!-- =========================
         Result Image
    ========================== -->


    <section class="page-section">


        <div class="page-section-header">


            <h2 class="page-section-title">

                リザルト

            </h2>


        </div>



        <div class="result-image">


            <img

                id="detailResultImage"

                src=""

                alt="バトルリザルト"

            >


        </div>


    </section>



    <!-- =========================
         My Result
    ========================== -->


    <section class="page-section">


        <div class="page-section-header">


            <h2 class="page-section-title">

                自分の成績

            </h2>


        </div>



        <div class="dashboard-grid">


            <div class="dashboard-item">


                <div class="dashboard-label">

                    キル

                </div>


                <div

                    id="myKills"

                    class="dashboard-value"

                >

                    --

                </div>


            </div>



            <div class="dashboard-item">


                <div class="dashboard-label">

                    デス

                </div>


                <div

                    id="myDeaths"

                    class="dashboard-value"

                >

                    --

                </div>


            </div>



            <div class="dashboard-item">


                <div class="dashboard-label">

                    スペシャル

                </div>


                <div

                    id="mySpecial"

                    class="dashboard-value"

                >

                    --

                </div>


            </div>



            <div class="dashboard-item">


                <div class="dashboard-label">

                    塗り

                </div>


                <div

                    id="myPaint"

                    class="dashboard-value"

                >

                    --

                </div>


            </div>


        </div>


    </section>
        <!-- =========================
         Team Result
    ========================== -->


    <section class="page-section">


        <div class="page-section-header">


            <h2 class="page-section-title">

                チーム結果

            </h2>


        </div>



        <div class="team-section">


            <h3 class="team-title">


                <span class="team-color ally"></span>


                味方チーム


            </h3>



            <div

                id="allyTeam"

                class="player-list"

            >

            </div>


        </div>



        <div class="team-section">


            <h3 class="team-title">


                <span class="team-color enemy"></span>


                相手チーム


            </h3>



            <div

                id="enemyTeam"

                class="player-list"

            >

            </div>


        </div>


    </section>



    <!-- =========================
         Player Template
    ========================== -->


    <template id="detailPlayerTemplate">


        <article class="player-card">


            <div class="player-header">


                <div class="player-icon">

                </div>



                <div class="player-info">


                    <h3 class="player-name">

                        プレイヤー名

                    </h3>


                    <p class="player-weapon">

                        使用ブキ

                    </p>


                </div>


            </div>



            <div class="player-stats">


                <div class="player-stat">


                    <span>

                        キル

                    </span>


                    <strong class="detail-kills">

                        --

                    </strong>


                </div>



                <div class="player-stat">


                    <span>

                        デス

                    </span>


                    <strong class="detail-deaths">

                        --

                    </strong>


                </div>



                <div class="player-stat">


                    <span>

                        スペシャル

                    </span>


                    <strong class="detail-special">

                        --

                    </strong>


                </div>



                <div class="player-stat">


                    <span>

                        塗り

                    </span>


                    <strong class="detail-paint">

                        --

                    </strong>


                </div>


            </div>


            <div class="player-awards">


                <span class="award-badge">

                    表彰

                </span>


            </div>


        </article>


    </template>



    <!-- =========================
         Match Members
    ========================== -->


    <section class="page-section">


        <div class="page-section-header">


            <h2 class="page-section-title">

                同じ試合のプレイヤー

            </h2>


        </div>



        <div

            id="matchMembers"

            class="player-list"

        >

        </div>


    </section>
        <!-- =========================
         Battle Analysis
    ========================== -->


    <section class="page-section">


        <div class="page-section-header">


            <h2 class="page-section-title">

                試合分析

            </h2>


        </div>



        <div class="dashboard-grid">


            <div class="dashboard-item">


                <div class="dashboard-label">

                    キルレート

                </div>


                <div

                    id="killRatio"

                    class="dashboard-value"

                >

                    --

                </div>


            </div>



            <div class="dashboard-item">


                <div class="dashboard-label">

                    平均キル順位

                </div>


                <div

                    id="killRank"

                    class="dashboard-value"

                >

                    --

                </div>


            </div>



            <div class="dashboard-item">


                <div class="dashboard-label">

                    スペシャル回数

                </div>


                <div

                    id="specialCount"

                    class="dashboard-value"

                >

                    --

                </div>


            </div>



            <div class="dashboard-item">


                <div class="dashboard-label">

                    貢献度

                </div>


                <div

                    id="contribution"

                    class="dashboard-value"

                >

                    --

                </div>


            </div>


        </div>


    </section>



    <!-- =========================
         Stage Analysis
    ========================== -->


    <section class="page-section">


        <div class="page-section-header">


            <h2 class="page-section-title">

                ステージ分析

            </h2>


        </div>



        <div class="data-card">


            <div class="data-title">

                ステージ別成績

            </div>


            <div

                id="stageAnalysis"

                class="data-description"

            >

                データ取得後に表示されます。

            </div>


        </div>


    </section>



    <!-- =========================
         Special Analysis
    ========================== -->


    <section class="page-section">


        <div class="page-section-header">


            <h2 class="page-section-title">

                スペシャル分析

            </h2>


        </div>



        <div

            id="specialAnalysis"

            class="data-card"

        >


            <div class="data-title">

                使用スペシャル

            </div>



            <div class="data-description">

                使用回数・成功率を表示します。

            </div>


        </div>


    </section>



    <!-- =========================
         Save / Share
    ========================== -->


    <section class="page-section">


        <div class="data-actions">


            <button

                id="saveDetailBattle"

                class="btn btn-primary"

            >

                戦績を保存

            </button>



            <button

                id="shareDetailBattle"

                class="btn btn-secondary"

            >

                結果を共有

            </button>


        </div>


    </section>



    <!-- =========================
         Loading / Error
    ========================== -->


    <section

        id="detailLoading"

        class="loading-page hidden"

    >


        <div class="spinner">

        </div>


        <p class="loading-text">

            試合データを取得中...

        </p>


    </section>



    <section

        id="detailError"

        class="error-page hidden"

    >


        <h2>

            データを取得できませんでした

        </h2>


        <button

            id="detailRetry"

            class="btn btn-primary"

        >

            再試行

        </button>


    </section>


</section>
