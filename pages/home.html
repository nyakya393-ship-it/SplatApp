<section class="home-page">

    <!-- =========================
         User Header
    ========================== -->

    <section class="profile-card">

        <div class="profile-avatar">

        </div>


        <div class="profile-info">

            <h2 class="profile-name">
                プレイヤー
            </h2>


            <p class="profile-id">
                Nintendo Account 未接続
            </p>

        </div>

    </section>


    <!-- =========================
         Status Overview
    ========================== -->

    <section class="page-section">


        <div class="page-section-header">

            <h2 class="page-section-title">

                今日の状況

            </h2>

        </div>


        <div class="dashboard-grid">


            <div class="dashboard-item">

                <p class="dashboard-label">
                    ランク
                </p>

                <p
                    class="dashboard-value"
                    id="playerRank"
                >
                    --
                </p>

            </div>


            <div class="dashboard-item">

                <p class="dashboard-label">
                    ウデマエ
                </p>

                <p
                    class="dashboard-value"
                    id="playerRankPoint"
                >
                    --
                </p>

            </div>


            <div class="dashboard-item">

                <p class="dashboard-label">
                    今日の勝率
                </p>

                <p
                    class="dashboard-value"
                    id="todayWinRate"
                >
                    --
                </p>

            </div>


            <div class="dashboard-item">

                <p class="dashboard-label">
                    プレイ時間
                </p>

                <p
                    class="dashboard-value"
                    id="playTime"
                >
                    --
                </p>

            </div>


        </div>


    </section>


    <!-- =========================
         Quick Menu
    ========================== -->

    <section class="page-section">


        <div class="page-section-header">

            <h2 class="page-section-title">

                メニュー

            </h2>

        </div>


        <div class="quick-actions">


            <button
                class="quick-action"
                data-page="battles"
            >

                <div class="quick-action-icon">

                </div>


                <span class="quick-action-title">

                    戦績を見る

                </span>


            </button>


            <button
                class="quick-action"
                data-page="analysis"
            >

                <div class="quick-action-icon">

                </div>


                <span class="quick-action-title">

                    分析を見る

                </span>


            </button>


            <button
                class="quick-action"
                data-page="schedule"
            >

                <div class="quick-action-icon">

                </div>


                <span class="quick-action-title">

                    スケジュール

                </span>


            </button>


            <button
                class="quick-action"
                data-page="salmon"
            >

                <div class="quick-action-icon">

                </div>


                <span class="quick-action-title">

                    サーモンラン

                </span>


            </button>


        </div>


    </section>
